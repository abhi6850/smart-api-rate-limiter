[build]
  command   = "npm run build"
  publish   = "public"

[build.environment]
  NODE_VERSION = "18"

[functions]
  directory    = "netlify/functions"
  node_bundler = "esbuild"

# Route all traffic to the API function
[[redirects]]
  from   = "/*"
  to     = "/.netlify/functions/api/:splat"
  status = 200
  force  = true
